    // ==================== 状态管理 ====================

    const AppProvider = ({ children }) => {
      const [state, setState] = useState(() => {
        const saved = localStorage.getItem('careerAppState');
        return saved ? JSON.parse(saved) : {
          user: { name: '探索者', testHistory: [], favorites: [] },
          currentQuestion: 0,
          answers: {},
          currentMatches: []
        };
      });

      useEffect(() => {
        localStorage.setItem('careerAppState', JSON.stringify(state));
      }, [state]);

      const setUserName = (name) => setState(s => ({ ...s, user: { ...s.user, name } }));
      const setCurrentQuestion = (index) => setState(s => ({ ...s, currentQuestion: index }));
      const setAnswer = (questionId, optionId) => setState(s => ({
        ...s, answers: { ...s.answers, [questionId]: optionId }
      }));

      const toggleFavorite = (careerId) => setState(s => ({
        ...s,
        user: {
          ...s.user,
          favorites: s.user.favorites.includes(careerId)
            ? s.user.favorites.filter(id => id !== careerId)
            : [...s.user.favorites, careerId]
        }
      }));

      const calculateMatches = () => {
        const { answers } = state;
        const scores = {};

        Object.entries(answers).forEach(([questionId, optionId]) => {
          const question = questions.find(q => q.id === questionId);
          const option = question?.options.find(o => o.id === optionId);
          if (option?.score) {
            Object.entries(option.score).forEach(([category, score]) => {
              scores[category] = (scores[category] || 0) + score;
            });
          }
        });

        const careerScores = {};
        Object.entries(scores).forEach(([category, score]) => {
          const careerIds = categoryToCareers[category] || [];
          careerIds.forEach(id => {
            careerScores[id] = (careerScores[id] || 0) + score;
          });
        });

        const matches = Object.entries(careerScores)
          .map(([careerId, score]) => {
            const career = careers.find(c => c.id === careerId);
            return career ? { career, score } : null;
          })
          .filter(m => m !== null)
          .sort((a, b) => b.score - a.score)
          .slice(0, 3);

        const maxScore = matches[0]?.score || 1;
        const normalized = matches.map(m => ({
          ...m,
          score: Math.round((m.score / maxScore) * 100)
        }));

        setState(s => ({ ...s, currentMatches: normalized }));
        return normalized;
      };

      const addTestResult = (matches) => setState(s => ({
        ...s,
        user: {
          ...s.user,
          testHistory: [{
            id: Date.now().toString(),
            date: new Date().toISOString(),
            matches
          }, ...s.user.testHistory]
        }
      }));

      const resetTest = () => setState(s => ({
        ...s, currentQuestion: 0, answers: {}, currentMatches: []
      }));

      return (
        <AppContext.Provider value={{
          state, setUserName, setCurrentQuestion, setAnswer,
          toggleFavorite, calculateMatches, addTestResult, resetTest

        setAnswer(currentQ.id, optionId);

        if (state.currentQuestion < questions.length - 1) {

          addTestResult(matches);

        if (state.currentQuestion > 0) {

    // ==================== 职业探索页 ====================
    const ExplorePage = ({ onNavigate }) => {
      const [selectedCategory, setSelectedCategory] = useState('全部');
      const [searchQuery, setSearchQuery] = useState('');

      const categories = ['全部', '科技', '创意', '商业', '医疗', '教育', '社会', '艺术', '科学', '生活'];

      const filteredCareers = careers.filter(career => {
        const matchesCategory = selectedCategory === '全部' || career.category === selectedCategory;
        const matchesSearch = career.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                             career.description.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return (
        <div className="min-h-screen pb-24 pt-6 px-4 bg-gradient-to-br from-slate-50 via-blue-50 to-purple-50">
          <div className="max-w-lg mx-auto">
            <div className="mb-6">
              <button
                onClick={() => onNavigate('home')}
                className="flex items-center gap-2 text-gray-600 hover:text-purple-600 mb-4"
              >
                <IconComponent name="arrowLeft" />
                <span className="font-medium">返回</span>
              </button>
              
              <div className="flex items-center gap-3 mb-4">
                <div className="text-blue-500"><IconComponent name="sparkles" /></div>
                <div>
                  <h1 className="text-2xl font-bold text-gray-800">探索职业</h1>
                  <p className="text-gray-500">发现你的无限可能（共 {careers.length} 个职业）</p>
                </div>
              </div>

              <div className="relative mb-4">
                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"><IconComponent name="search" /></div>
                <input
                  type="text"
                  placeholder="搜索职业..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border-2 border-gray-100 focus:border-purple-300 focus:outline-none shadow-sm"
                />
              </div>

              <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                {categories.map((category) => (
                  <button
                    key={category}
                    onClick={() => setSelectedCategory(category)}
                    className={`px-4 py-2 rounded-full whitespace-nowrap font-medium transition-all duration-300 ${
                      selectedCategory === category
                        ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-lg'
                        : 'bg-white text-gray-600'
                    }`}
                  >
                    {category}
                  </button>
                ))}
              </div>
            </div>

            <div className="space-y-4">
              {filteredCareers.length > 0 ? (
                filteredCareers.map((career) => (
                  <CareerCard key={career.id} career={career} showDetails={true} />
                ))
              ) : (
                <div className="text-center py-12 bg-white/60 backdrop-blur-sm rounded-3xl">
                  <div className="text-gray-300 mb-4"><IconComponent name="sparkles" /></div>
                  <p className="text-gray-500 text-lg">没有找到匹配的职业</p>
                  <p className="text-gray-400 text-sm mt-1">试试其他关键词或分类</p>
                </div>
              )}
            </div>

            {filteredCareers.length > 0 && (
              <div className="mt-6 text-center text-gray-500 text-sm">
                共找到 {filteredCareers.length} 个职业
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==================== 个人中心页 ====================
    const ProfilePage = ({ onNavigate }) => {
      const { state, setUserName } = useAppContext();
      const [isEditingName, setIsEditingName] = useState(false);
      const [nameInput, setNameInput] = useState(state.user.name);
      const [activeTab, setActiveTab] = useState('favorites');

      const favoriteCareers = careers.filter(c => state.user.favorites.includes(c.id));

      const handleSaveName = () => {
        if (nameInput.trim()) {
          setUserName(nameInput.trim());
        }
        setIsEditingName(false);
      };

      const formatDate = (dateString) => {
        const date = new Date(dateString);
        return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
      };

      return (
        <div className="min-h-screen pb-24 pt-6 px-4 bg-gradient-to-br from-slate-50 via-indigo-50 to-purple-50">
          <div className="max-w-lg mx-auto">
            <button
              onClick={() => onNavigate('home')}
              className="flex items-center gap-2 text-gray-600 hover:text-purple-600 mb-6"
            >
              <IconComponent name="arrowLeft" />
              <span className="font-medium">返回</span>
            </button>

            <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-6 shadow-xl mb-6">
              <div className="flex items-center gap-4 mb-4">
                <div className="w-20 h-20 bg-gradient-to-br from-purple-500 to-indigo-500 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                  {state.user.name.charAt(0).toUpperCase()}
                </div>
                <div className="flex-1">
                  {isEditingName ? (
                    <input
                      type="text"
                      value={nameInput}
                      onChange={(e) => setNameInput(e.target.value)}
                      onBlur={handleSaveName}
                      onKeyDown={(e) => e.key === 'Enter' && handleSaveName()}
                      className="flex-1 px-3 py-2 border-2 border-purple-300 rounded-xl focus:outline-none"
                      autoFocus
                    />
                  ) : (
                    <div className="flex items-center gap-2">
                      <h2 className="text-xl font-bold text-gray-800">{state.user.name}</h2>
                      <button onClick={() => setIsEditingName(true)} className="p-1 hover:bg-gray-100 rounded-full">
                        <div className="text-gray-400"><IconComponent name="edit" /></div>
                      </button>
                    </div>
                  )}
                  <p className="text-gray-500">职业探索者</p>
                </div>
              </div>

              <div className="grid grid-cols-3 gap-4 pt-4 border-t border-gray-100">
                <div className="text-center">
                  <div className="text-2xl font-bold text-purple-600">{state.user.testHistory.length}</div>
                  <div className="text-sm text-gray-500">测试次数</div>
                </div>
                <div className="text-center">
                  <div className="text-2xl font-bold text-pink-500">{state.user.favorites.length}</div>
                  <div className="text-sm text-gray-500">收藏职业</div>
                </div>
                <div className="text-center">
                  <div className="text-2xl font-bold text-blue-500">{careers.length}</div>
                  <div className="text-sm text-gray-500">职业总数</div>
                </div>
              </div>
            </div>

            <div className="flex gap-2 mb-6">
              <button
                onClick={() => setActiveTab('favorites')}
                className={`flex-1 py-3 px-4 rounded-2xl font-medium transition-all duration-300 flex items-center justify-center gap-2 ${
                  activeTab === 'favorites'
                    ? 'bg-gradient-to-r from-pink-500 to-rose-500 text-white shadow-lg'
                    : 'bg-white text-gray-600'
                }`}
              >
                <IconComponent name="heart" />
                收藏夹
              </button>
              <button
                onClick={() => setActiveTab('history')}
                className={`flex-1 py-3 px-4 rounded-2xl font-medium transition-all duration-300 flex items-center justify-center gap-2 ${
                  activeTab === 'history'
                    ? 'bg-gradient-to-r from-blue-500 to-indigo-500 text-white shadow-lg'
                    : 'bg-white text-gray-600'
                }`}
              >
                <IconComponent name="clock" />
                测试记录
              </button>
            </div>

            {activeTab === 'favorites' ? (
              <div className="space-y-4">
                {favoriteCareers.length > 0 ? (
                  favoriteCareers.map((career) => (
                    <CareerCard key={career.id} career={career} showDetails={true} />
                  ))
                ) : (
                  <div className="text-center py-12 bg-white/60 backdrop-blur-sm rounded-3xl">
                    <div className="text-gray-300 mb-4"><IconComponent name="heart" /></div>
                    <p className="text-gray-500 text-lg">还没有收藏的职业</p>
                    <p className="text-gray-400 text-sm mt-1">去探索页面发现感兴趣的职业吧</p>
                    <button
                      onClick={() => onNavigate('explore')}
                      className="mt-4 px-6 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-full font-medium"
                    >
                      开始探索
                    </button>
                  </div>
                )}
              </div>
            ) : (
              <div className="space-y-4">
                {state.user.testHistory.length > 0 ? (
                  state.user.testHistory.map((record) => (
                    <div key={record.id} className="bg-white/90 backdrop-blur-sm rounded-3xl p-6 shadow-lg">
                      <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-2 text-gray-500">
                          <IconComponent name="calendar" />
                          <span className="text-sm">{formatDate(record.date)}</span>
                        </div>
                        <div className="text-yellow-400"><IconComponent name="sparkles" /></div>
                      </div>
                      <p className="text-gray-800 font-medium mb-3">你的最佳匹配：</p>
                      <div className="space-y-3">
                        {record.matches.slice(0, 2).map((match) => (
                          <div key={match.career.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                            <span className="font-medium text-gray-700">{match.career.title}</span>
                            <span className="text-purple-600 font-bold">{match.score}%</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))
                ) : (
                  <div className="text-center py-12 bg-white/60 backdrop-blur-sm rounded-3xl">
                    <div className="text-gray-300 mb-4"><IconComponent name="calendar" /></div>
                    <p className="text-gray-500 text-lg">还没有测试记录</p>
                    <p className="text-gray-400 text-sm mt-1">完成职业测试来获取记录</p>
                    <button
                      onClick={() => onNavigate('test')}
                      className="mt-4 px-6 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-full font-medium"
                    >
                      开始测试
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==================== 主应用 ====================
    const App = () => {
      const [currentPage, setCurrentPage] = useState('home');

      const handleNavigate = (page) => {
        setCurrentPage(page);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const renderPage = () => {
        switch (currentPage) {
          case 'test': return <TestPage onNavigate={handleNavigate} />;
          case 'result': return <ResultPage onNavigate={handleNavigate} />;
          case 'explore': return <ExplorePage onNavigate={handleNavigate} />;
          case 'profile': return <ProfilePage onNavigate={handleNavigate} />;
          default: return <HomePage onNavigate={handleNavigate} />;
        }
      };

      return (
        <AppProvider>
          <div className="min-h-screen">
            {renderPage()}
            <Navbar currentPage={currentPage} onNavigate={handleNavigate} />
          </div>
        </AppProvider>
      );
    };

    // 渲染应用
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
